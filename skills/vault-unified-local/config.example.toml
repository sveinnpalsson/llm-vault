[repos]
docs_repo = "~/path/to/llm-vault"
inbox_repo = "~/path/to/inbox-vault"

[commands]
llm_vault_ops_cmd = "./vault-ops"
docs_vector_index_cmd = "scripts/vault_vector_index.py"
inbox_cli_cmd = "skills/inbox-vault-local/scripts/iv-cli.sh"

[defaults]
top_k = 10
clearance = "redacted"
rrf_k = 60
timeout_seconds = 120

[weights]
inbox = 1.0
docs = 1.0
photos = 1.0

[source_toggles]
enable_inbox = true
enable_docs = true
enable_photos = true
