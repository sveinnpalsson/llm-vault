name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: "false"

  lint-test-and-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check scripts tests

      - name: Pytest
        env:
          LLM_VAULT_ALLOW_PLAINTEXT_FOR_TESTS: "1"
          LLM_VAULT_DB_PASSWORD: "ci-test-password"
        run: pytest -q

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev

      - name: Install package + audit tool
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: pip-audit
        run: pip-audit --progress-spinner off
